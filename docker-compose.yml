version: '3.8'
services:
  aerocore-backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - SECRET_KEY=${SECRET_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - MSG_BATCH_SIZE=${MSG_BATCH_SIZE}
      - OPS_BATCH_SIZE=${OPS_BATCH_SIZE}
      - CHAT_BATCH_SIZE=${CHAT_BATCH_SIZE}
      - CRAWLER_FALLBACK_SWEEP_SEC=${CRAWLER_FALLBACK_SWEEP_SEC}
      - SLA_CRAWLER_INTERVAL_SEC=${SLA_CRAWLER_INTERVAL_SEC}
    volumes:
      - .:/app
